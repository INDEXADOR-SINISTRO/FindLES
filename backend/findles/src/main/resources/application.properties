spring.application.name=findles

# ==========================================
# CONFIGURAÇŐES DO BANCO DE DADOS (DOCKER)
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5433/indexdb
spring.datasource.username=admin
spring.datasource.password=adminpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# CONFIGURAÇŐES DO JPA E HIBERNATE
# ==========================================
# Como estamos usando FLYWAY para gerenciar as tabelas, o Hibernate NĂO deve criar nada sozinho.
# Usamos "validate" apenas para ele conferir se as nossas classes Java batem com as tabelas do banco.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIGURAÇŐES DE SEGURANÇA (JWT)
# ==========================================
spring.api.security.token.secret=EstaSenhaEhMuitoForteEPrecisaTerNoMinimo32CaracteresFindles




